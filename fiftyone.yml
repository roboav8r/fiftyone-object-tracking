name: "@roboav8r/fiftyone-object-tracking"
version: 0.2.0
description: >
  FiftyOne plugin for working with grouped 3D tracking datasets:
  a generic Object Tracking panel with a per-scene bird's-eye-view
  (timeline scrubber) and an ephemeral-trajectory workflow (build,
  filter, browse) computed on demand from a tracking source.
fiftyone:
  version: ">=2.18.0"
panels:
  - ObjectTracking
operators:
  - list_tracking_scenes
  - get_scene_track_payload
  - get_camera_frame_urls
  - view_track_patches
  - build_trajectories
