name: "@roboav8r/fiftyone-object-tracking"
version: 0.2.0
description: >
  FiftyOne plugin for working with grouped 3D tracking datasets:
  build per-trajectory datasets (BEV thumbnails rendered server-side
  with matplotlib) from a tracking source, and browse scenes in a
  BEVTrackVisualization panel with a timeline scrubber.
fiftyone:
  version: ">=2.18.0"
panels:
  - BEVTrackVisualization
operators:
  - list_tracking_scenes
  - get_scene_track_payload
  - get_camera_frame_urls
  - view_track_patches
  - build_trajectories
  - split_track
  - join_tracks
